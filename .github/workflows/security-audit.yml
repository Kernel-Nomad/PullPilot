name: Security audit

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Capture dependency pins for audit
        run: python -m pip freeze | grep -v -E '^pullpilot(==| @)' > /tmp/audit-req.txt
      - name: Install pip-audit
        run: python -m pip install pip-audit
      - name: Audit dependencies
        run: pip-audit -r /tmp/audit-req.txt
