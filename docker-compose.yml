# PullPilot — https://github.com/Kernel-Nomad/PullPilot
#
# 1-minute start (matches README):
#   sudo mkdir -p /srv/docker-stacks
#   mkdir -p ~/pullpilot && cd ~/pullpilot
#   curl -fsSL -o docker-compose.yml https://raw.githubusercontent.com/Kernel-Nomad/PullPilot/main/docker-compose.yml
#   docker compose up -d
#
# Optional .env next to this file: DOCKER_ROOT_PATH, PULLPILOT_PORT, TZ, AUTH_*, etc.
# Compose loads .env for variable substitution when the file exists.
#
services:
  pullpilot:
    container_name: pullpilot
    image: ghcr.io/kernel-nomad/pullpilot:latest
    restart: unless-stopped
    ports:
      - "${PULLPILOT_PORT:-8000}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - pullpilot_data:/app/data
      - ${DOCKER_ROOT_PATH:-/srv/docker-stacks}:${DOCKER_ROOT_PATH:-/srv/docker-stacks}
    environment:
      TZ: ${TZ:-UTC}
      DATA_DIR: ${DATA_DIR:-/app/data}
      DOCKER_ROOT_PATH: ${DOCKER_ROOT_PATH:-/srv/docker-stacks}
      PROJECTS_ROOT: ${PROJECTS_ROOT:-}
      HEALTHCHECK_TIMEOUT: ${HEALTHCHECK_TIMEOUT:-60}
      COMMAND_TIMEOUT: ${COMMAND_TIMEOUT:-300}
      AUTH_USER: ${AUTH_USER:-}
      AUTH_PASS: ${AUTH_PASS:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      SESSION_HTTPS_ONLY: ${SESSION_HTTPS_ONLY:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      LOGIN_RATE_LIMIT_ENABLED: ${LOGIN_RATE_LIMIT_ENABLED:-true}
      LOGIN_RATE_LIMIT_MAX: ${LOGIN_RATE_LIMIT_MAX:-15}
      LOGIN_RATE_LIMIT_WINDOW_SEC: ${LOGIN_RATE_LIMIT_WINDOW_SEC:-300}
      TRUST_X_FORWARDED_FOR: ${TRUST_X_FORWARDED_FOR:-false}

volumes:
  pullpilot_data:
