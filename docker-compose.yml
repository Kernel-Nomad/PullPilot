# PullPilot — requisitos en .env: DOCKER_ROOT_PATH, TZ (y credenciales; ver README y .env.example).
# Este archivo es la referencia versionada; descárgalo o clónalo desde el repo en lugar de copiar YAML a mano.
# https://github.com/Kernel-Nomad/PullPilot
services:
  pullpilot:
    container_name: pullpilot
    image: ghcr.io/kernel-nomad/pullpilot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PULLPILOT_PORT:-8000}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - pullpilot_data:/app/data
      - ${DOCKER_ROOT_PATH}:${DOCKER_ROOT_PATH}
    environment:
      - TZ=${TZ}

volumes:
  pullpilot_data:
