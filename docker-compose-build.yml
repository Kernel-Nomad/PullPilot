# PullPilot — construcción local (sin GHCR).
# Uso: clona el repo, copia .env.example a .env, ajusta variables y ejecuta:
#   docker compose -f docker-compose-build.yml up -d --build
# Misma configuración que docker-compose.yml salvo que la imagen se construye aquí.
services:
  pullpilot:
    container_name: pullpilot
    build:
      context: .
      dockerfile: Dockerfile
    image: pullpilot:local
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PULLPILOT_PORT:-8000}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - pullpilot_data:/app/data
      - ${DOCKER_ROOT_PATH}:${DOCKER_ROOT_PATH}
    environment:
      - TZ=${TZ}

volumes:
  pullpilot_data:
